name: build llvm

on:
  workflow_dispatch:
    inputs:
      llvm_version:
        description: "LLVM version to build (e.g., 21.1.8)"
        required: true
        type: string

concurrency:
  group: build-llvm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native builds
          - os: windows-2025
            llvm_mode: RelWithDebInfo
            lto: OFF
          - os: windows-2025
            llvm_mode: RelWithDebInfo
            lto: ON
          - os: ubuntu-24.04
            llvm_mode: Debug
            lto: OFF
          - os: ubuntu-24.04
            llvm_mode: RelWithDebInfo
            lto: OFF
          - os: ubuntu-24.04
            llvm_mode: RelWithDebInfo
            lto: ON
          - os: macos-15
            llvm_mode: Debug
            lto: OFF
          - os: macos-15
            llvm_mode: RelWithDebInfo
            lto: OFF
          - os: macos-15
            llvm_mode: RelWithDebInfo
            lto: ON

          # Cross-compilation builds
          # macOS x64 (from arm64 macos-15)
          - os: macos-15
            llvm_mode: RelWithDebInfo
            lto: OFF
            target_triple: x86_64-apple-darwin
          - os: macos-15
            llvm_mode: RelWithDebInfo
            lto: ON
            target_triple: x86_64-apple-darwin

          # Linux aarch64 (from x64 ubuntu-24.04)
          - os: ubuntu-24.04
            llvm_mode: RelWithDebInfo
            lto: OFF
            target_triple: aarch64-linux-gnu
            pixi_env: cross-linux-aarch64
          - os: ubuntu-24.04
            llvm_mode: RelWithDebInfo
            lto: ON
            target_triple: aarch64-linux-gnu
            pixi_env: cross-linux-aarch64

          # Windows arm64 (from x64 windows-2025)
          - os: windows-2025
            llvm_mode: RelWithDebInfo
            lto: OFF
            target_triple: aarch64-pc-windows-msvc
            pixi_env: cross-windows-arm64
          - os: windows-2025
            llvm_mode: RelWithDebInfo
            lto: ON
            target_triple: aarch64-pc-windows-msvc
            pixi_env: cross-windows-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Free Disk Space
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main

      - name: Increase Swap Space
        if: runner.os == 'Linux'
        run: |
          echo "===== Initial Status ====="
          sudo swapon --show
          free -h

          echo "===== Creating Swap File ====="
          sudo swapoff -a
          sudo fallocate -l 16G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile

          echo "===== Final Status ====="
          sudo swapon --show
          free -h
          df -h

      - uses: ./.github/actions/setup-pixi
        with:
          environments: ${{ matrix.pixi_env || 'package' }}

      - name: Free Disk Space (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== Before cleanup ==="
          df -h /

          # Remove iOS/tvOS/watchOS/visionOS simulators
          if [ -d "/Library/Developer/CoreSimulator" ]; then
            sudo rm -rf /Library/Developer/CoreSimulator
            echo "Removed CoreSimulator"
          fi

          # Remove unnecessary Xcode platforms (keep macOS only)
          XCODE_PATH="$(xcode-select -p)"
          PLATFORMS_DIR="${XCODE_PATH}/Platforms"
          for platform in iPhoneOS.platform iPhoneSimulator.platform AppleTVOS.platform AppleTVSimulator.platform WatchOS.platform WatchSimulator.platform XROS.platform XRSimulator.platform; do
            if [ -d "${PLATFORMS_DIR}/${platform}" ]; then
              sudo rm -rf "${PLATFORMS_DIR}/${platform}"
              echo "Removed ${platform}"
            fi
          done

          # Remove Android SDK
          sudo rm -rf ~/Library/Android

          # Remove .NET/PowerShell
          sudo rm -rf /usr/local/share/dotnet
          sudo rm -rf /usr/local/share/powershell

          # Remove Haskell
          sudo rm -rf ~/.ghcup

          echo "=== After cleanup ==="
          df -h /

      - name: Clone llvm-project
        shell: bash
        run: |
          VERSION="${{ inputs.llvm_version || '21.1.8' }}"
          echo "Cloning LLVM ${VERSION}..."
          git clone --branch "llvmorg-${VERSION}" --depth 1 https://github.com/llvm/llvm-project.git .llvm

      - name: Build LLVM (install-distribution)
        shell: bash
        run: |
          ENV="${{ matrix.pixi_env || 'package' }}"
          EXTRA_ARGS=""
          if [[ -n "${{ matrix.target_triple }}" ]]; then
            EXTRA_ARGS="--target-triple=${{ matrix.target_triple }}"
          fi
          pixi run -e "$ENV" python3 scripts/build-llvm.py \
            --llvm-src=.llvm \
            --mode="${{ matrix.llvm_mode }}" \
            --lto="${{ matrix.lto }}" \
            --build-dir=build \
            ${EXTRA_ARGS}

      - name: Package LLVM install directory
        shell: bash
        run: |
          # Determine platform/arch from target triple or runner OS
          if [[ -n "${{ matrix.target_triple }}" ]]; then
            case "${{ matrix.target_triple }}" in
              x86_64-apple-darwin)       PLATFORM="macos";   ARCH="x64" ;;
              aarch64-linux-gnu)         PLATFORM="linux";   ARCH="arm64" ;;
              aarch64-pc-windows-msvc)   PLATFORM="windows"; ARCH="arm64" ;;
            esac
          else
            PLATFORM="linux"; ARCH="x64"
            if [[ "${{ matrix.os }}" == windows-* ]]; then
              PLATFORM="windows"
            elif [[ "${{ matrix.os }}" == macos-* ]]; then
              PLATFORM="macos"; ARCH="arm64"
            fi
          fi

          case "$PLATFORM" in
            linux)   TOOLCHAIN="gnu" ;;
            macos)   TOOLCHAIN="clang" ;;
            windows) TOOLCHAIN="msvc" ;;
          esac
          if [[ "${{ matrix.llvm_mode }}" == "Debug" ]]; then MODE_TAG="debug"; else MODE_TAG="releasedbg"; fi
          SUFFIX=""
          if [[ "${{ matrix.lto }}" == "ON" ]]; then SUFFIX+="-lto"; fi
          if [[ "${{ matrix.llvm_mode }}" == "Debug" && "${{ matrix.os }}" != windows-* ]]; then SUFFIX+="-asan"; fi
          ARCHIVE="${ARCH}-${PLATFORM}-${TOOLCHAIN}-${MODE_TAG}${SUFFIX}.tar.xz"

          set -eo pipefail
          tar -C .llvm/build-install -cf - . | xz -T0 -9 -c > "${ARCHIVE}"
          echo "LLVM_INSTALL_ARCHIVE=${ARCHIVE}" >> "${GITHUB_ENV}"

      - name: Upload LLVM install artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.LLVM_INSTALL_ARCHIVE }}
          path: ${{ env.LLVM_INSTALL_ARCHIVE }}
          if-no-files-found: error
