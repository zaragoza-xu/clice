name: release llvm

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Run ID from build-llvm containing LLVM artifacts"
        required: true
        type: string
      llvm_version:
        description: "LLVM version (e.g. 22.1.4)"
        required: true
        type: string

concurrency:
  group: release-llvm
  cancel-in-progress: true

env:
  SOURCE_RUN_ID: ${{ inputs.source_run_id }}
  LLVM_VERSION: ${{ inputs.llvm_version }}

jobs:
  discover:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: x64-linux-gnu-releasedbg.tar.xz
          - os: macos-15
            artifact: arm64-macos-clang-releasedbg.tar.xz
          - os: windows-2025
            artifact: x64-windows-msvc-releasedbg.tar.xz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-pixi
        with:
          environments: package

      - name: Free Disk Space (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ -d "/Library/Developer/CoreSimulator" ]; then
            sudo rm -rf /Library/Developer/CoreSimulator
          fi
          XCODE_PATH="$(xcode-select -p)"
          PLATFORMS_DIR="${XCODE_PATH}/Platforms"
          for p in iPhoneOS.platform iPhoneSimulator.platform AppleTVOS.platform AppleTVSimulator.platform WatchOS.platform WatchSimulator.platform XROS.platform XRSimulator.platform; do
            [ -d "${PLATFORMS_DIR}/${p}" ] && sudo rm -rf "${PLATFORMS_DIR}/${p}"
          done
          sudo rm -rf ~/Library/Android /usr/local/share/dotnet /usr/local/share/powershell ~/.ghcup

      - name: Download LLVM artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "${{ env.SOURCE_RUN_ID }}" \
            -n "${{ matrix.artifact }}" -D .llvm-download
          mkdir -p .llvm
          tar -xf ".llvm-download/${{ matrix.artifact }}" -C .llvm
          rm -rf .llvm-download

      - name: Build clice
        shell: bash
        run: |
          pixi run cmake-config RelWithDebInfo ON -- \
            "-DLLVM_INSTALL_PATH=.llvm"
          pixi run cmake-build RelWithDebInfo

      - name: Discover unused libraries
        shell: bash
        run: |
          python3 scripts/release-llvm.py discover \
            --install-dir .llvm/lib \
            --build-dir build/RelWithDebInfo \
            --manifest pruned-libs.json \
            --skip-pattern "*Tidy*Module*"

      - name: Print prune results
        shell: bash
        run: |
          python3 -c "
          import json
          data = json.load(open('pruned-libs.json'))
          removed = data['removed']
          total = data.get('total_saved_bytes', 0)
          print(f'Libraries prunable: {len(removed)}')
          print(f'Space saved: {total / 1048576:.1f} MB')
          for entry in sorted(removed, key=lambda e: e['size'], reverse=True)[:20]:
              print(f'  {entry[\"size\"] / 1048576:>7.1f} MB  {entry[\"name\"]}')
          "

      - name: Upload manifest
        uses: actions/upload-artifact@v7
        with:
          name: prune-manifest-${{ matrix.os }}
          path: pruned-libs.json

  create-release:
    needs: discover
    runs-on: ubuntu-24.04
    steps:
      - name: Create or reuse release
        env:
          GH_TOKEN: ${{ secrets.UPLOAD_LLVM }}
        run: |
          TAG="${{ env.LLVM_VERSION }}"
          REPO="clice-io/clice-llvm"
          NOTES="LLVM ${TAG} — build run https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if gh release view "$TAG" --repo "$REPO" &>/dev/null; then
            gh release edit "$TAG" --repo "$REPO" --notes "$NOTES"
          else
            gh release create "$TAG" --repo "$REPO" --title "$TAG" --notes "$NOTES"
          fi

  repackage:
    needs: [discover, create-release]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        artifact:
          - arm64-linux-gnu-releasedbg-lto.tar.xz
          - arm64-linux-gnu-releasedbg.tar.xz
          - arm64-windows-msvc-releasedbg-lto.tar.xz
          - arm64-windows-msvc-releasedbg.tar.xz
          - arm64-macos-clang-debug-asan.tar.xz
          - arm64-macos-clang-releasedbg-lto.tar.xz
          - arm64-macos-clang-releasedbg.tar.xz
          - x64-linux-gnu-debug-asan.tar.xz
          - x64-linux-gnu-releasedbg-lto.tar.xz
          - x64-linux-gnu-releasedbg.tar.xz
          - x64-macos-clang-releasedbg-lto.tar.xz
          - x64-macos-clang-releasedbg.tar.xz
          - x64-windows-msvc-releasedbg-lto.tar.xz
          - x64-windows-msvc-releasedbg.tar.xz
    steps:
      - uses: actions/checkout@v7

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup

      - name: Download prune manifests
        uses: actions/download-artifact@v8
        with:
          pattern: prune-manifest-*
          path: manifests

      - name: Repackage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/release-llvm.py repackage \
            --source-run-id "${{ env.SOURCE_RUN_ID }}" \
            --manifests-dir manifests \
            --output-dir artifacts \
            --max-parallel 1 \
            --artifacts "${{ matrix.artifact }}"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.UPLOAD_LLVM }}
        run: |
          gh release upload "${{ env.LLVM_VERSION }}" \
            "artifacts/${{ matrix.artifact }}" \
            --repo clice-io/clice-llvm \
            --clobber
