name: cross-pair

on:
  workflow_call:
    inputs:
      build_os:
        required: true
        type: string
      test_os:
        required: true
        type: string
      target_triple:
        required: true
        type: string
      # Unified arch-os-abi name (e.g. arm64-linux-gnu) used for artifact
      # naming; the triple above keeps the compiler's spelling.
      target_name:
        required: true
        type: string
      pixi_env:
        required: false
        type: string
        default: "default"
      asset_name:
        required: true
        type: string

env:
  CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
  SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_COMPILERCHECK: content
  CCACHE_MAXSIZE: 2G
  SCCACHE_CACHE_SIZE: 2G

jobs:
  build:
    runs-on: ${{ inputs.build_os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-pixi
        with:
          environments: ${{ inputs.pixi_env }}

      - name: Restore compiler cache
        uses: actions/cache@v6
        with:
          path: ${{ runner.os == 'Windows' && '.cache/sccache' || '.cache/ccache' }}
          key: ${{ runner.os }}-RelWithDebInfo-${{ inputs.target_triple }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-RelWithDebInfo-${{ inputs.target_triple }}-ccache-

      - name: Zero cache stats
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            pixi run -e "${{ inputs.pixi_env }}" -- sccache --stop-server || true
            pixi run -e "${{ inputs.pixi_env }}" -- sccache --zero-stats || true
          else
            pixi run -e "${{ inputs.pixi_env }}" -- ccache --zero-stats || true
          fi
        shell: bash

      - name: Build
        shell: bash
        run: |
          pixi run -e "${{ inputs.pixi_env }}" cmake-config RelWithDebInfo OFF -- \
            "-DCLICE_TARGET_TRIPLE=${{ inputs.target_triple }}"
          pixi run -e "${{ inputs.pixi_env }}" cmake-build RelWithDebInfo

      # Package here, where the object files live (dsymutil needs them);
      # promotion to a release is still gated on the whole run being green.
      - name: Package release artifacts
        shell: bash
        run: |
          pixi run -e "${{ inputs.pixi_env }}" -- cmake --build build/RelWithDebInfo \
            --target clice-pack clice-pack-symbol

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: package-${{ inputs.asset_name }}
          path: |
            build/RelWithDebInfo/clice.tar.gz
            build/RelWithDebInfo/clice.zip
            build/RelWithDebInfo/clice-symbol.tar.xz
            build/RelWithDebInfo/clice-symbol.zip
          if-no-files-found: error
          # 30 days bounds how old a commit a stable tag can still promote.
          retention-days: 30

      - name: Upload full debug info
        if: ${{ !contains(inputs.target_triple, 'windows') }}
        uses: actions/upload-artifact@v7
        with:
          name: debug-info-${{ inputs.target_name }}
          path: |
            build/RelWithDebInfo/pack-symbol/clice.debug
            build/RelWithDebInfo/pack-symbol/clice.dSYM
          if-no-files-found: error
          retention-days: 90

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: cross-build-${{ inputs.target_name }}
          path: |
            build/RelWithDebInfo/bin/
            build/RelWithDebInfo/lib/
          if-no-files-found: error
          retention-days: 1

      - name: Print cache stats and stop server
        if: always()
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            pixi run -e "${{ inputs.pixi_env }}" -- sccache --show-stats
            pixi run -e "${{ inputs.pixi_env }}" -- sccache --stop-server || true
          else
            pixi run -e "${{ inputs.pixi_env }}" -- ccache --show-stats
          fi
        shell: bash

  test:
    needs: build
    runs-on: ${{ inputs.test_os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-pixi
        with:
          environments: test-run

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          name: cross-build-${{ inputs.target_name }}
          path: build/RelWithDebInfo/

      - name: Make binaries executable
        if: runner.os != 'Windows'
        run: chmod +x build/RelWithDebInfo/bin/*

      - name: Unit tests
        timeout-minutes: 5
        run: pixi run -e test-run unit-test RelWithDebInfo

      - name: Integration tests
        timeout-minutes: 15
        run: pixi run -e test-run integration-test RelWithDebInfo

      - name: Smoke tests
        timeout-minutes: 5
        run: pixi run -e test-run smoke-test RelWithDebInfo
