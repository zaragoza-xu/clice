name: vscode

# Single parameterized pipeline for every extension build the project ships:
#   source: none     — universal vsix without the server binary (PR check);
#                      the extension falls back to the clice.executable setting.
#   source: package  — six platform vsix embedding the release packages from
#                      publish-clice.yml (release, nightly, and dry runs).
#   source: build    — six platform vsix embedding the test-suite binaries
#                      (no LTO, no strip) already built by native/cross-test,
#                      so a fix is installable the moment its CI run is green.
on:
  workflow_call:
    inputs:
      source:
        description: "Server binaries to bundle: none, package, or build"
        type: string
        default: "none"
      # Publish against this release tag even off a tag ref (nightly creates
      # the tag itself and calls this workflow). Empty means dry run unless
      # the ref is a v* tag. The extension version is injected from the tag,
      # so the placeholder version in package.json is never released.
      release_tag:
        type: string
        default: ""
      prerelease:
        type: boolean
        default: false

jobs:
  build-vscode:
    if: ${{ inputs.source == 'none' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-pixi
        with:
          environments: node

      - name: Build extension
        run: |
          FLAG="${{ contains(github.ref_name, '-') && '--pre-release' || '' }}"
          pixi run build-vscode $FLAG

  publish-vscode:
    if: ${{ inputs.source != 'none' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - vsce_target: linux-x64
            package_artifact: package-clice-x64-linux-gnu.tar.gz
            build_artifact: native-build-ubuntu-24.04-RelWithDebInfo
          - vsce_target: linux-arm64
            package_artifact: package-clice-arm64-linux-gnu.tar.gz
            build_artifact: cross-build-arm64-linux-gnu
          - vsce_target: darwin-arm64
            package_artifact: package-clice-arm64-macos-darwin.tar.gz
            build_artifact: native-build-macos-15-RelWithDebInfo
          - vsce_target: darwin-x64
            package_artifact: package-clice-x64-macos-darwin.tar.gz
            build_artifact: cross-build-x64-macos-darwin
          - vsce_target: win32-x64
            package_artifact: package-clice-x64-windows-msvc.zip
            build_artifact: native-build-windows-2025-RelWithDebInfo
          - vsce_target: win32-arm64
            package_artifact: package-clice-arm64-windows-msvc.zip
            build_artifact: cross-build-arm64-windows-msvc

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_tag || github.ref }}
          persist-credentials: false

      - uses: ./.github/actions/setup-pixi
        with:
          environments: node

      - name: Download server binaries
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.source == 'package' && matrix.package_artifact || matrix.build_artifact }}
          path: /tmp/server

      # Both sources end up as editors/vscode/clice/{bin,lib/clang,...}, the
      # layout bundledExecutable() resolves inside the installed extension.
      - name: Stage bundled server
        run: |
          DEST=editors/vscode/clice
          if [ "${{ inputs.source }}" = "package" ]; then
            cd /tmp/server
            if ls *.zip > /dev/null 2>&1; then unzip -q *.zip; else tar xzf *.tar.gz; fi
            cd -
            mv /tmp/server/clice "$DEST"
          else
            mkdir -p "$DEST/bin" "$DEST/lib"
            # Only the executable: test builds keep unit_tests and (on
            # Windows) a huge PDB next to it.
            for f in clice clice.exe; do
              if [ -f "/tmp/server/bin/$f" ]; then cp "/tmp/server/bin/$f" "$DEST/bin/"; fi
            done
            # Test builds embed full debug info (~700MB on ELF); the vsix
            # only needs the runnable binary. --strip-debug only: further
            # options are not supported for Mach-O.
            pixi run -e node -- llvm-strip --strip-debug "$DEST"/bin/clice*
            cp -r /tmp/server/lib/clang "$DEST/lib/"
            cp docs/clice.toml "$DEST/"
          fi
          cp LICENSE "$DEST/"
          cp LICENSE editors/vscode/

      # The repo carries a fixed placeholder version; every published build
      # gets its real version from the release tag, injected here without
      # being committed back.
      - name: Inject release version
        env:
          RELEASE_TAG: ${{ inputs.release_tag || (startsWith(github.ref, 'refs/tags/v') && github.ref_name || '') }}
        run: |
          if [ -n "$RELEASE_TAG" ]; then
            python3 - <<'EOF'
          import json, os
          path = "editors/vscode/package.json"
          data = json.load(open(path))
          data["version"] = os.environ["RELEASE_TAG"].lstrip("v")
          json.dump(data, open(path, "w"), indent=2)
          EOF
          fi

      - name: Package platform extension
        run: |
          FLAG="${{ (inputs.prerelease || contains(github.ref_name, '-')) && '--pre-release' || '' }}"
          pixi run build-vscode $FLAG --target ${{ matrix.vsce_target }}

      - name: Upload vsix artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ inputs.source }}-${{ matrix.vsce_target }}
          path: editors/vscode/*.vsix
          if-no-files-found: error
          retention-days: 7

  # Publishing runs apart from the packaging matrix: the Marketplace
  # intermittently throws internal errors (TF400898) when six publishes for
  # one extension land concurrently, and parallel release uploads race on
  # the same release. Packaging stays parallel above; this single job
  # uploads and publishes the collected vsix files one at a time.
  # No job-level permissions block: startup validation checks every nested
  # job against the caller's grant even when the job will be skipped, and
  # the PR-check caller grants read-only. The publishing callers pass
  # contents: write at the call site.
  publish-release:
    needs: publish-vscode
    if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || inputs.release_tag != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.release_tag || github.ref }}
          persist-credentials: false

      - uses: ./.github/actions/setup-pixi
        with:
          environments: node

      - name: Download vsix packages
        uses: actions/download-artifact@v8
        with:
          pattern: vsix-${{ inputs.source }}-*
          merge-multiple: true
          path: vsix

      - name: Upload .vsix to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" --clobber vsix/*.vsix

      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCODE_EXTENSION }}
        run: |
          FLAG="${{ (inputs.prerelease || contains(github.ref_name, '-')) && '--pre-release' || '' }}"
          FAILED=""
          for f in vsix/*.vsix; do
            OK=""
            for ATTEMPT in 1 2 3; do
              # --skip-duplicate: a rerun meets versions an earlier attempt
              # already published; that is success, not an error.
              if pixi run publish-vscode -p "$VSCE_PAT" $FLAG --skip-duplicate \
                  --packagePath "$GITHUB_WORKSPACE/$f"; then
                OK=1
                break
              fi
              if [ "$ATTEMPT" -lt 3 ]; then
                echo "publish failed for $f (attempt $ATTEMPT); retrying in 30s"
                sleep 30
              fi
            done
            if [ -z "$OK" ]; then
              FAILED="$FAILED $f"
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "::error::marketplace publish failed after retries:$FAILED"
            exit 1
          fi
