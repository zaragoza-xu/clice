name: release-check

# Dry run of the release packaging pipeline: builds all six clice packages and
# all six bundled extension packages. Every upload step is tag-gated, so
# nothing is published. Runs automatically on PRs that touch release plumbing,
# and on demand from any branch.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/publish-clice.yml"
      - ".github/workflows/publish-vscode.yml"
      - ".github/workflows/release-check.yml"
      - "CMakeLists.txt"
      - "cmake/release.cmake"
      - "cmake/archive.cmake"

jobs:
  clice:
    uses: ./.github/workflows/publish-clice.yml

  vscode:
    needs: clice
    uses: ./.github/workflows/publish-vscode.yml
    with:
      bundle: true
