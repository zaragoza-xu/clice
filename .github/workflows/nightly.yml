name: nightly

# Nightly pre-release channel (odd-minor versions): if main gained tested
# builds since the last nightly, tag the newest packaged commit as
# vX.<odd>.YYYYMMDDHH on the odd minor above the newest release, promote its
# CI packages, and publish it as a GitHub pre-release plus a Marketplace
# pre-release.
# Old nightlies are pruned after 30 days; stable (even-minor) releases are
# never touched.
on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      publish: ${{ steps.version.outputs.publish }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Pick the commit to promote
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The tag must point at the exact commit the promoted binaries
          # were built from, so pick the newest main commit whose green run
          # still has live package artifacts: path-filtered runs (e.g.
          # docs-only commits) build nothing, and packages expire after
          # 30 days.
          COMMIT=""
          for RUN in $(gh run list --repo "$GITHUB_REPOSITORY" --workflow main \
              --branch main --event push --status success --limit 100 \
              --json databaseId -q '.[].databaseId'); do
            LIVE=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN/artifacts?name=package-clice-x64-linux-gnu.tar.gz" \
              --jq '[.artifacts[] | select(.expired | not)] | length')
            if [ "$LIVE" -gt 0 ]; then
              COMMIT=$(gh run view "$RUN" --repo "$GITHUB_REPOSITORY" \
                --json headSha -q .headSha)
              break
            fi
          done
          if [ -z "$COMMIT" ]; then
            echo "::error::no recent green main run has live package artifacts"
            exit 1
          fi
          echo "Promoting $COMMIT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Compute nightly version
        id: version
        env:
          COMMIT: ${{ steps.pick.outputs.commit }}
        run: |
          # Nightlies live on the odd minor above the newest release: after
          # stable v0.2.0 ships they become v0.3.*, keeping the Marketplace
          # pre-release channel ahead of stable.
          LATEST=$(git tag -l 'v*.*.*' --sort=-v:refname | head -1)
          MAJOR=0
          MINOR=1
          if [ -n "$LATEST" ]; then
            BASE=${LATEST#v}
            MAJOR=${BASE%%.*}
            REST=${BASE#*.}
            MINOR=${REST%%.*}
            if [ $((MINOR % 2)) -eq 0 ]; then MINOR=$((MINOR + 1)); fi
          fi
          TAG="v$MAJOR.$MINOR.$(date -u +%Y%m%d%H)"
          LAST=$(git tag -l "v$MAJOR.$MINOR.*" --sort=-v:refname | head -1)
          # Manual dispatch skips only the same-hour duplicate below, so a
          # failed nightly can be retried on the same commit.
          if [ -n "$LAST" ] && [ "$(git rev-parse "$LAST^{commit}")" = "$COMMIT" ] \
            && [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            echo "No new packaged commits since $LAST; skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git rev-parse "$TAG" > /dev/null 2>&1; then
            echo "$TAG already exists; skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "publish=true" >> "$GITHUB_OUTPUT"

      # Tags pushed with GITHUB_TOKEN do not trigger workflows, which is
      # exactly right here: the publish workflows are invoked directly below
      # instead of through the tag-push release path.
      - name: Create tag and pre-release
        if: steps.version.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          COMMIT: ${{ steps.pick.outputs.commit }}
        run: |
          # The picked commit may postdate the checkout if a run went green
          # in between; fetch it before tagging.
          git rev-parse -q --verify "$COMMIT^{commit}" > /dev/null \
            || git fetch origin "$COMMIT"
          git tag "$TAG" "$COMMIT"
          git push origin "$TAG"

          LAST=$(git tag -l "${TAG%.*}.*" --sort=-v:refname | sed -n 2p)
          {
            echo "Nightly build from \`$(git rev-parse --short "$COMMIT")\`."
            echo
            if [ -n "$LAST" ]; then
              echo "## Changes since $LAST"
              git log --format='- %s' "$LAST".."$COMMIT"
              echo
            fi
            URL="https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG"
            V=${TAG#v}
            echo "## Downloads"
            echo
            echo "| Platform | Server | VS Code extension | Symbols |"
            echo "| --- | --- | --- | --- |"
            row() {
              PKG="clice-$2.$3"
              SYM="clice-$2.symbols.$4"
              VSIX="clice-$5-$V.vsix"
              echo "| $1 | [$PKG]($URL/$PKG) | [$VSIX]($URL/$VSIX) | [$SYM]($URL/$SYM) |"
            }
            row "Linux x64" x64-linux-gnu tar.gz tar.xz linux-x64
            row "Linux arm64" arm64-linux-gnu tar.gz tar.xz linux-arm64
            row "macOS arm64" arm64-macos-darwin tar.gz tar.xz darwin-arm64
            row "macOS x64" x64-macos-darwin tar.gz tar.xz darwin-x64
            row "Windows x64" x64-windows-msvc zip zip win32-x64
            row "Windows arm64" arm64-windows-msvc zip zip win32-arm64
            echo
            echo "Symbol packages hold GSYM data for crash log symbolization"
            echo "via \`scripts/symbolize.py\`. VS Code users on the Marketplace"
            echo "pre-release channel update automatically."
          } > /tmp/notes.md
          gh release create "$TAG" --prerelease --title "$TAG" \
            --notes-file /tmp/notes.md
          # Mirror the release notes into the run summary page.
          cat /tmp/notes.md >> "$GITHUB_STEP_SUMMARY"

  clice:
    needs: prepare
    if: needs.prepare.outputs.publish == 'true'
    permissions:
      contents: write
      actions: read
    uses: ./.github/workflows/publish-clice.yml
    with:
      release_tag: ${{ needs.prepare.outputs.tag }}

  vscode:
    needs: [prepare, clice]
    if: needs.prepare.outputs.publish == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/publish-vscode.yml
    with:
      source: package
      release_tag: ${{ needs.prepare.outputs.tag }}
      prerelease: true
    secrets: inherit

  # Nightlies expire after 30 days. Only odd-minor pre-releases are pruned;
  # stable releases and their tags are never deleted.
  cleanup:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete expired nightlies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CUTOFF=$(date -u -d '30 days ago' +%s)
          gh release list --repo "$GITHUB_REPOSITORY" --limit 200 \
            --json tagName,isPrerelease,createdAt \
            -q '.[] | select(.isPrerelease) | .tagName + " " + .createdAt' |
          while read -r TAG CREATED; do
            MINOR=$(echo "$TAG" | cut -d. -f2)
            case "$MINOR" in *[!0-9]* | "") continue ;; esac
            if [ $((MINOR % 2)) -eq 0 ]; then continue; fi
            if [ "$(date -u -d "$CREATED" +%s)" -lt "$CUTOFF" ]; then
              echo "Pruning $TAG (created $CREATED)"
              gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" \
                --cleanup-tag --yes
            fi
          done
