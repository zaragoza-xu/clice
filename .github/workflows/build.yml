name: build

on:
  workflow_call:

env:
  CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
  SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache
  CCACHE_BASEDIR: ${{ github.workspace }}
  SCCACHE_BASEDIRS: ${{ github.workspace }}
  CCACHE_COMPILERCHECK: content
  CCACHE_MAXSIZE: 2G
  SCCACHE_CACHE_SIZE: 2G

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            build_type: RelWithDebInfo
          - os: ubuntu-24.04
            build_type: Debug
          - os: ubuntu-24.04
            build_type: RelWithDebInfo
          - os: macos-15
            build_type: Debug
          - os: macos-15
            build_type: RelWithDebInfo
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pixi
        with:
          environments: default

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Windows' && '.cache/sccache' || '.cache/ccache' }}
          key: ${{ runner.os }}-${{ matrix.build_type }}-native-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.build_type }}-native-ccache-

      - name: Zero cache stats
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            pixi run -- sccache --stop-server || true
            pixi run -- sccache --zero-stats || true
          else
            pixi run -- ccache --zero-stats || true
          fi
        shell: bash

      - name: Build
        run: pixi run build ${{ matrix.build_type }} ON

      # The .llvm globs cover prebuilt LLVM packages with shared libraries
      # (e.g. Debug): test binaries reference them via build-tree RPATH, so
      # they must exist at the same path on the test runner. Static packages
      # simply match nothing here.
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: native-build-${{ matrix.os }}-${{ matrix.build_type }}
          include-hidden-files: true
          path: |
            build/${{ matrix.build_type }}/bin/
            build/${{ matrix.build_type }}/lib/
            build/${{ matrix.build_type }}/.llvm/lib/*.so*
            build/${{ matrix.build_type }}/.llvm/lib/*.dylib
            build/${{ matrix.build_type }}/.llvm/bin/*.dll
          if-no-files-found: error
          retention-days: 1

      - name: Print cache stats and stop server
        if: always()
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            pixi run -- sccache --show-stats
            pixi run -- sccache --stop-server || true
          else
            pixi run -- ccache --show-stats
          fi
        shell: bash

  cross:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            build_type: RelWithDebInfo
            target_triple: x86_64-apple-darwin
          - os: ubuntu-24.04
            build_type: RelWithDebInfo
            target_triple: aarch64-linux-gnu
            pixi_env: cross-linux-aarch64
          - os: windows-2025
            build_type: RelWithDebInfo
            target_triple: aarch64-pc-windows-msvc
            pixi_env: cross-windows-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-pixi
        with:
          environments: ${{ matrix.pixi_env || 'default' }}

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Windows' && '.cache/sccache' || '.cache/ccache' }}
          key: ${{ runner.os }}-${{ matrix.build_type }}-${{ matrix.target_triple }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.build_type }}-${{ matrix.target_triple }}-ccache-

      - name: Zero cache stats
        run: |
          ENV="${{ matrix.pixi_env || 'default' }}"
          if [ "$RUNNER_OS" = "Windows" ]; then
            pixi run -e "$ENV" -- sccache --stop-server || true
            pixi run -e "$ENV" -- sccache --zero-stats || true
          else
            pixi run -e "$ENV" -- ccache --zero-stats || true
          fi
        shell: bash

      - name: Build
        shell: bash
        run: |
          ENV="${{ matrix.pixi_env || 'default' }}"
          pixi run -e "$ENV" cmake-config ${{ matrix.build_type }} OFF -- \
            "-DCLICE_TARGET_TRIPLE=${{ matrix.target_triple }}"
          pixi run -e "$ENV" cmake-build ${{ matrix.build_type }}

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: cross-build-${{ matrix.target_triple }}
          path: |
            build/${{ matrix.build_type }}/bin/
            build/${{ matrix.build_type }}/lib/
          if-no-files-found: error
          retention-days: 1

      - name: Print cache stats and stop server
        if: always()
        run: |
          ENV="${{ matrix.pixi_env || 'default' }}"
          if [ "$RUNNER_OS" = "Windows" ]; then
            pixi run -e "$ENV" -- sccache --show-stats
            pixi run -e "$ENV" -- sccache --stop-server || true
          else
            pixi run -e "$ENV" -- ccache --show-stats
          fi
        shell: bash
