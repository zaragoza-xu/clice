name: native-test

on:
  workflow_call:

env:
  CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
  SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache
  CCACHE_BASEDIR: ${{ github.workspace }}
  SCCACHE_BASEDIRS: ${{ github.workspace }}
  CCACHE_COMPILERCHECK: content
  CCACHE_MAXSIZE: 2G
  SCCACHE_CACHE_SIZE: 2G

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            build_type: RelWithDebInfo
          - os: ubuntu-24.04
            build_type: Debug
          - os: ubuntu-24.04
            build_type: RelWithDebInfo
          - os: macos-15
            build_type: Debug
          - os: macos-15
            build_type: RelWithDebInfo
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-pixi
        with:
          environments: default test-run
          activate-environment: default

      - name: Restore compiler cache
        uses: actions/cache@v6
        with:
          path: ${{ runner.os == 'Windows' && '.cache/sccache' || '.cache/ccache' }}
          key: ${{ runner.os }}-${{ matrix.build_type }}-native-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.build_type }}-native-ccache-

      - name: Zero cache stats
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            pixi run -- sccache --stop-server || true
            pixi run -- sccache --zero-stats || true
          else
            pixi run -- ccache --zero-stats || true
          fi
        shell: bash

      - name: Build
        run: pixi run build ${{ matrix.build_type }} ON

      # Upload artifacts for editor tests (only ubuntu RelWithDebInfo is needed,
      # but uploading all keeps the option open for other downstream consumers).
      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: native-build-${{ matrix.os }}-${{ matrix.build_type }}
          include-hidden-files: true
          path: |
            build/${{ matrix.build_type }}/bin/
            build/${{ matrix.build_type }}/lib/
            build/${{ matrix.build_type }}/.llvm/lib/*.so*
            build/${{ matrix.build_type }}/.llvm/lib/*.dylib
            build/${{ matrix.build_type }}/.llvm/bin/*.dll
          if-no-files-found: error
          retention-days: 1

      - name: Unit tests
        timeout-minutes: 5
        run: pixi run -e test-run unit-test ${{ matrix.build_type }}

      - name: Integration tests
        timeout-minutes: 20
        run: pixi run -e test-run integration-test ${{ matrix.build_type }}

      - name: Smoke tests
        timeout-minutes: 15
        run: pixi run -e test-run smoke-test ${{ matrix.build_type }}

      # sccache runs a background server that holds file locks; if it is
      # still alive when the pixi post-action tries to clean up the env
      # cache on Windows, the cleanup fails and marks the job as failed.
      - name: Print cache stats and stop server
        if: always()
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            pixi run -- sccache --show-stats
            pixi run -- sccache --stop-server || true
          else
            pixi run -- ccache --show-stats
          fi
        shell: bash
